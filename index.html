<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pacientes | Clínica Médica</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>Sistema de Gestão de Pacientes</h1>
        <p>Preencha os dados abaixo para realizar o cadastro.</p>

        <form id="form-paciente">
            <div class="campo">
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Ex: Danilo Pereira" required>
            </div>

            <div class="campo">
                <label for="celular">Celular:</label>
                <input type="tel" id="celular" name="celular" placeholder="(71) 9876-5321" required>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>

            <button type="submit" id="btn-cadastrar">Cadastrar Paciente</button>
        </form>

        <hr>
            <button id="btn-listar" style="background-color: #28a745; margin-top: 10px;">Mostrar Pacientes Registrados</button>

            <div id="lista-pacientes" style="margin-top: 20px;">
    </div>
    </div>

    <script src="script.js" type="module"></script>
</body>
</html>
